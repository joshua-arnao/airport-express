server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/users/**

        - id: schedule-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/routes/**, /api/schedules/**, /api/trips/**

        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/bookings/**, /api/tickets/**

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**

        - id: boarding-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/boardings/**

        - id: tracking-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/trackings/**